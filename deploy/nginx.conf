# Nginx reverse proxy cho sinhnhat.newwayrealty.vn -> container (cổng 3000)
# Đặt file này tại: /etc/nginx/sites-available/sinhnhat.newwayrealty.vn
# rồi: ln -s /etc/nginx/sites-available/sinhnhat.newwayrealty.vn /etc/nginx/sites-enabled/
#
# Bước 1 chạy bản HTTP (block 80) trước để certbot cấp SSL.
# Sau khi `certbot --nginx` chạy, nó tự thêm block 443 + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name sinhnhat.newwayrealty.vn;

    # cho phép upload file Excel lớn ở /admin
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}

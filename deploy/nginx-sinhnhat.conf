# Nginx host config cho sinhnhat.newwayrealty.vn -> container (127.0.0.1:3003)
# Cài: sudo cp deploy/nginx-sinhnhat.conf /etc/nginx/sites-available/sinhnhat
#      sudo ln -sf /etc/nginx/sites-available/sinhnhat /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
# (cùng kiểu với giaitrinh.newwayrealty.vn -> 127.0.0.1:3002)

server {
    listen 80;
    server_name sinhnhat.newwayrealty.vn;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload file Excel ở /admin
        client_max_body_size 50M;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }
}

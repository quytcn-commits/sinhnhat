services:
  poster:
    build: .
    image: newway-poster:latest
    container_name: newway-poster
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Mật khẩu trang /admin — đặt trong file .env (mặc định newway2026 nếu không có)
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-newway2026}
      - DATA_PATH=/app/runtime-data/employees.json
    volumes:
      # Giữ data nhân sự đã upload qua /admin (bền qua các lần restart)
      - employees-data:/app/runtime-data
    restart: unless-stopped

volumes:
  employees-data:
